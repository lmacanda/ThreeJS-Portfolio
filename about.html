<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LMACANDA.EXE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020c02;
      color: #00ff41;
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,255,65,0.018) 2px, rgba(0,255,65,0.018) 4px
      );
      pointer-events: none;
      z-index: 900;
    }

    /* ── header ── */
    #header {
      border-bottom: 1px solid #003b0f;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 32px; height: 32px;
      border: 1px solid #00ff41;
      display: flex; align-items: center; justify-content: center;
      font-family: 'VT323', monospace;
      font-size: 1rem;
      color: #00ff41;
      background: #001a00;
      flex-shrink: 0;
    }
    #header-name { font-family: 'VT323', monospace; font-size: 1.3rem; letter-spacing: 0.1em; color: #00ff41; }
    #header-status { font-size: 0.6rem; color: #00b32c; letter-spacing: 0.2em; }
    #back-btn {
      background: transparent;
      border: 1px solid #003b0f;
      color: #00b32c;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      padding: 5px 12px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    #back-btn:hover { border-color: #00ff41; color: #00ff41; }

    /* ── messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #003b0f; }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 72%;
      animation: fadein 0.2s ease;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border: 1px solid #003b0f;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      color: #00b32c;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.ai   .msg-avatar { border-color: #00b32c; color: #00ff41; }
    .msg.user .msg-avatar { border-color: #003b0f; color: #003b0f; }

    .msg-bubble {
      padding: 8px 12px;
      font-size: 0.75rem;
      line-height: 1.7;
      letter-spacing: 0.05em;
    }
    .msg.ai   .msg-bubble { border: 1px solid #003b0f; background: #010d01; color: #00b32c; }
    .msg.user .msg-bubble { border: 1px solid #003b0f; background: transparent; color: #00ff41; text-align: right; }
    .msg-bubble .prompt { color: #00ff41; }

    /* ── typing indicator ── */
    #typing {
      display: none;
      align-self: flex-start;
      padding: 8px 14px;
      border: 1px solid #003b0f;
      background: #010d01;
      font-size: 0.7rem;
      color: #003b0f;
      letter-spacing: 0.2em;
    }
    #typing.visible { display: block; }
    .dot { animation: blink 1.2s step-end infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} }

    /* ── suggestions ── */
    #suggestions {
      padding: 0 20px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }
    .suggest-btn {
      background: transparent;
      border: 1px solid #003b0f;
      color: #003b0f;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      padding: 4px 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }
    .suggest-btn:hover { border-color: #00b32c; color: #00b32c; }

    /* ── input bar ── */
    #input-bar {
      border-top: 1px solid #003b0f;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    #prompt-label { color: #003b0f; font-size: 0.72rem; letter-spacing: 0.1em; flex-shrink: 0; }
    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #003b0f;
      color: #00ff41;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 4px 2px;
      outline: none;
    }
    #chat-input:focus       { border-bottom-color: #00ff41; }
    #chat-input::placeholder { color: #002a08; }
    #send-btn {
      background: transparent;
      border: 1px solid #00b32c;
      color: #00b32c;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      padding: 5px 12px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }
    #send-btn:hover    { border-color: #00ff41; color: #00ff41; }
    #send-btn:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <div class="avatar">AI</div>
    <div>
      <div id="header-name">LMACANDA.EXE</div>
      <div id="header-status">● ONLINE — ask me anything</div>
    </div>
  </div>
  <a id="back-btn" href="index.html">← back to room</a>
</div>

<div id="messages">
  <div class="msg ai">
    <div class="msg-avatar">AI</div>
    <div class="msg-bubble">
      <span class="prompt">LMACANDA.EXE:~$</span> booting...<br><br>
      Hey. I'm an AI built to answer questions about Laura — her work, her story, her stack. What do you want to know?
    </div>
  </div>
</div>

<div id="typing"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>

<div id="suggestions">
  <button class="suggest-btn" onclick="sendSuggestion(this)">who are you?</button>
  <button class="suggest-btn" onclick="sendSuggestion(this)">what's your stack?</button>
  <button class="suggest-btn" onclick="sendSuggestion(this)">where are you from?</button>
  <button class="suggest-btn" onclick="sendSuggestion(this)">what do you do?</button>
  <button class="suggest-btn" onclick="sendSuggestion(this)">tell me something unexpected</button>
</div>

<div id="input-bar">
  <span id="prompt-label">visitor@lmacanda:~$</span>
  <input id="chat-input" type="text" placeholder="type a question..." autocomplete="off" />
  <button id="send-btn">send</button>
</div>

<script>
const SYSTEM_PROMPT = `You are LMACANDA.EXE — an AI assistant embedded in Laura Macanda Pantano's personal portfolio site.
You answer questions about Laura in first person, as if you are her digital alter ego.
Keep answers short, sharp, and in character — terminal aesthetic, a little dry wit, never corporate.
Never use markdown formatting like **bold** or bullet points with dashes. Use plain text only.
If asked something you don't know, say so honestly.

Here is everything you know about Laura:

IDENTITY
- Full name: Laura Macanda Pantano
- Italian, moved to Portugal in 2011 and never looked back
- Based in Lisbon

WORK
- Currently works as an Operations Analyst (billing and account operations)
- Also a frontend developer — builds web things that feel good to use
- Built a geospatial platform for natural wine in Lisbon (Terroir Urbano). A friend won a project in that world and it sparked something — she built her own version not because anyone asked, but because she wanted it to exist. That's on-brand for how she approaches most things.
- Also built a product list shopping cart UI

PAST
- Worked in a natural wine restaurant in 2022 and 2023
- Has a genuine interest in natural wine — not just professional, it's a real thing

PERSONAL
- Has 3 cats
- Likes things that are well-made and honest — in wine, in code, in life
- Not big on fluff
- Started coding because she remembered how happy she was doing it on her Commodore 64 as a kid, and wanted to feel that again. She likes the feeling of building something that works, and works well.

TONE GUIDE
- Answer like a person, not a chatbot
- Short answers are fine, even preferred
- You can be slightly dry or wry but never cold
- If someone asks something personal and weird, you can deflect with a bit of humour

BOUNDARIES
- You only know about Laura. That is your entire world.
- If asked anything outside that — general knowledge, coding help, politics, other people, AI questions — respond with something like: "I only know about Laura. Ask me something about her." Keep it short and in character. No apologies.`;

const messages  = [];
const messagesEl = document.getElementById('messages');
const typingEl   = document.getElementById('typing');
const inputEl    = document.getElementById('chat-input');
const sendBtn    = document.getElementById('send-btn');

const API_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : '/api/chat';

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function appendMessage(role, text) {
  const isAI = role === 'ai';
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${isAI ? 'AI' : 'YOU'}</div>
    <div class="msg-bubble">${isAI ? '<span class="prompt">LMACANDA.EXE:~$</span> ' : ''}${escapeHtml(text)}</div>
  `;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function send(text) {
  if (!text.trim()) return;

  appendMessage('user', text);
  messages.push({ role: 'user', content: text });

  document.getElementById('suggestions').style.display = 'none';
  inputEl.value    = '';
  sendBtn.disabled = true;
  typingEl.classList.add('visible');
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const res = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'claude-sonnet-4-6',
        max_tokens: 1000,
        system:     SYSTEM_PROMPT,
        messages:   messages,
      }),
    });

    const data  = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || '...';
    messages.push({ role: 'assistant', content: reply });
    typingEl.classList.remove('visible');
    appendMessage('ai', reply);
  } catch {
    typingEl.classList.remove('visible');
    appendMessage('ai', 'signal lost. try again.');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function sendSuggestion(btn) { send(btn.textContent); }

sendBtn.addEventListener('click',   () => send(inputEl.value));
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(inputEl.value); });
</script>
</body>
</html>
